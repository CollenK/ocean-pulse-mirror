stages:
  - validate
  - migrate
  - build
  - deploy

variables:
  SUPABASE_PROJECT_ID: "oftyqrsmirvzmxpbmucd"

# Validate code quality and type safety
validate:
  stage: validate
  image: node:20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npm run type-check
    - npm run test:unit

# Scan dependencies for known vulnerabilities
security-audit:
  stage: validate
  image: node:20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID
  script:
    - npm audit --audit-level=high
  allow_failure: true

# Run database migrations when migration files change
migrate:
  stage: migrate
  image: debian:bookworm-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - supabase/migrations/**/*
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  variables:
    SUPABASE_CLI_VERSION: "2.1.1"
    SUPABASE_DB_PASSWORD: $SUPABASE_DB_PWD
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.deb" -o supabase.deb
    - dpkg -i supabase.deb
  script:
    - supabase link --project-ref $SUPABASE_PROJECT_ID --password $SUPABASE_DB_PASSWORD
    - supabase db push --password $SUPABASE_DB_PASSWORD
  environment:
    name: production

# Build the Next.js application
build:
  stage: build
  image: node:20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    NEXT_PUBLIC_SUPABASE_URL: $SUPABASE_URL
    NEXT_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .next/cache/
  before_script:
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week

# Deployment is handled by Vercel's GitLab integration.
# Vercel automatically deploys on push to main.
# The deploy stage below is available for manual/custom deployments.
